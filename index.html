<html lang="ca">

<title>Grans Projectes · Barcelona 2009–2035</title>

function loadScript(src, cb) {
  var s = document.createElement('script');
  s.src = src;
  s.onload = cb;
  s.onerror = function() {
    // fallback CDN
    loadScript('https://unpkg.com/leaflet@1.9.4/dist/leaflet.js', cb);
  };
  document.head.appendChild(s);
}

<style>
:root{
  --bg:#111827;--surface:#1f2937;--surface2:#374151;
  --navy:#0f172a;--gold:#f4a623;--accent:#e8192c;
  --text:#f9fafb;--text2:#9ca3af;--border:#374151;
  --radius:10px;--shadow:0 2px 16px rgba(0,0,0,.4);
  --c-urb:#3b82f6;--c-tra:#10b981;--c-cul:#f59e0b;
  --c-eco:#8b5cf6;--c-dep:#ec4899;--c-sal:#ef4444;
  --sidebar:380px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}

/* HEADER */
header{
  height:110px;background:var(--navy);border-bottom:1px solid var(--border);
  flex-shrink:0;z-index:1000;display:flex;flex-direction:column;
}
.hrow1{
  display:flex;align-items:center;gap:14px;
  padding:0 20px;height:56px;border-bottom:1px solid var(--border);
}
.logo{
  font-family:'Syne',sans-serif;font-size:17px;font-weight:800;
  color:var(--text);letter-spacing:-.01em;white-space:nowrap;flex-shrink:0;
}
.logo em{color:var(--gold);font-style:normal;}
.searchbar{
  flex:1;max-width:380px;
  display:flex;align-items:center;gap:8px;
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:40px;padding:7px 14px;transition:border-color .18s;
}
.searchbar:focus-within{border-color:var(--gold);}
.searchbar input{flex:1;border:none;background:none;outline:none;font-family:'Inter',sans-serif;font-size:13px;color:var(--text);}
.searchbar input::placeholder{color:var(--text2);}
.kpis{margin-left:auto;display:flex;gap:18px;flex-shrink:0;}
.kpi{text-align:right;}
.kpi .n{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--gold);line-height:1;}
.kpi .l{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;}

/* FILTER ROW */
.hrow2{
  display:flex;align-items:center;gap:5px;
  padding:0 16px;height:52px;overflow-x:auto;scrollbar-width:none;
}
.hrow2::-webkit-scrollbar{display:none;}
.fsep{width:1px;height:20px;background:var(--border);flex-shrink:0;margin:0 3px;}

.spill{
  display:inline-flex;align-items:center;gap:5px;
  border:1.5px solid var(--border);border-radius:30px;
  background:var(--surface);padding:5px 12px;
  font-size:11px;font-weight:500;cursor:pointer;
  white-space:nowrap;transition:all .15s;color:var(--text2);flex-shrink:0;
}
.spill:hover{border-color:var(--text2);color:var(--text);}
.spill.on{border-color:var(--gold);background:var(--gold);color:#000;font-weight:600;}

.cpill{
  display:inline-flex;align-items:center;gap:5px;
  border:1.5px solid var(--border);border-radius:30px;
  background:var(--surface);padding:5px 13px;
  font-size:11px;font-weight:500;cursor:pointer;
  white-space:nowrap;transition:all .18s;flex-shrink:0;
  color:var(--text2);
}
.cpill:hover{border-color:var(--text2);}
.cpill.on{opacity:1;}
.cpill.off{opacity:.38;filter:grayscale(.6);}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* MAIN */
.main{display:flex;flex:1;overflow:hidden;}

/* LEFT PANEL */
.panel{
  width:var(--sidebar);display:flex;flex-direction:column;
  flex-shrink:0;background:var(--bg);overflow:hidden;
  border-right:1px solid var(--border);
}
.phdr{
  padding:10px 14px 8px;font-size:11px;font-weight:500;
  color:var(--text2);flex-shrink:0;
  border-bottom:1px solid var(--border);
}
.cards{flex:1;overflow-y:auto;padding:6px 8px 24px;}
.cards::-webkit-scrollbar{width:3px;}
.cards::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.catsep{
  display:flex;align-items:center;gap:6px;
  padding:14px 6px 6px;
  font-family:'Syne',sans-serif;font-size:9px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;color:var(--text2);
}
.catsep::after{content:'';flex:1;height:1px;background:var(--border);}
.catcnt{background:var(--surface2);color:var(--text2);border-radius:9px;padding:1px 5px;font-size:8px;font-weight:600;}

/* CARD */
.card{
  background:var(--surface);border-radius:var(--radius);
  padding:11px 13px;cursor:pointer;
  border:1.5px solid transparent;
  transition:border-color .12s,box-shadow .12s;margin-bottom:4px;
}
.card:hover{border-color:var(--surface2);box-shadow:0 0 0 1px var(--surface2);}
.card.active{border-color:var(--gold);box-shadow:0 0 0 2px rgba(244,166,35,.15);}
.ctop{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:5px;}
.cname{font-size:12px;font-weight:600;line-height:1.3;color:var(--text);}
.cinv{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:var(--gold);white-space:nowrap;flex-shrink:0;}
.cmeta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:3px;}
.cbadge{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:600;padding:2px 6px;border-radius:20px;}
.cstatus{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:600;padding:2px 6px;border-radius:20px;}
.cyears{font-size:10px;color:var(--text2);}
.cdesc{font-size:10px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* MAP */
.mapwrap{flex:1;position:relative;overflow:hidden;min-width:0;}
#map{width:100%;height:100%;}

/* Leaflet overrides for dark theme */
.leaflet-container{background:#111827 !important;}
.leaflet-control-zoom{border:1px solid var(--border) !important;border-radius:8px !important;overflow:hidden;}
.leaflet-control-zoom a{
  background:var(--surface) !important;color:var(--text) !important;
  border:none !important;border-bottom:1px solid var(--border) !important;
  width:32px !important;height:32px !important;line-height:32px !important;
  font-size:16px !important;
}
.leaflet-control-zoom a:hover{background:var(--surface2) !important;}
.leaflet-control-attribution{background:rgba(17,24,39,.8) !important;color:var(--text2) !important;font-size:9px !important;}
.leaflet-control-attribution a{color:var(--text2) !important;}

/* Custom popup */
.leaflet-popup-content-wrapper{
  background:var(--surface) !important;
  border:1px solid var(--border) !important;
  border-radius:12px !important;
  box-shadow:0 24px 64px rgba(0,0,0,.7) !important;
  padding:0 !important;overflow:hidden;
}
.leaflet-popup-tip-container{display:none !important;}
.leaflet-popup-content{margin:0 !important;width:300px !important;}
.leaflet-popup-close-button{color:var(--text2) !important;font-size:18px !important;top:8px !important;right:10px !important;z-index:10;}
.leaflet-popup-close-button:hover{color:var(--text) !important;}

/* DRAWER */
.fpop{
  position:absolute;
  z-index:900;
  background:#1e293b;
  border:1px solid rgba(255,255,255,.1);
  border-radius:14px;
  padding:22px 22px 18px;
  width:320px;
  box-shadow:0 24px 64px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.05);
  display:none;
  pointer-events:all;
  animation:popIn .18s ease;
  max-height:calc(100% - 40px);
  overflow-y:auto;
}
.fpop.open{display:block;}
@keyframes popIn{from{opacity:0;transform:scale(.94) translateY(4px);}to{opacity:1;transform:scale(1) translateY(0);}}
.fpop-close{
  position:absolute;top:12px;right:12px;
  width:26px;height:26px;border-radius:50%;
  border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);
  cursor:pointer;color:rgba(255,255,255,.5);font-size:15px;
  display:flex;align-items:center;justify-content:center;
  transition:all .13s;
}
.fpop-close:hover{background:rgba(255,255,255,.12);color:#fff;}
.fpop-cat{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;margin-bottom:10px;text-transform:uppercase;letter-spacing:.07em;}
.fpop-name{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;line-height:1.2;color:#f1f5f9;margin-bottom:14px;}
.fpop-sep{height:1px;background:rgba(255,255,255,.08);margin-bottom:12px;}
.fpop-status{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 11px;border-radius:6px;margin-bottom:12px;}
.fpop-desc{font-size:12px;color:#94a3b8;line-height:1.65;margin-bottom:16px;}
.fpop-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;margin-bottom:16px;}
.fpop-kv .k{font-size:8px;color:#64748b;text-transform:uppercase;letter-spacing:.09em;margin-bottom:3px;}
.fpop-kv .v{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:#f1f5f9;line-height:1;}
.fpop-kv .v.inv{color:var(--gold);}
.fpop-kv .v.sm{font-family:'Inter',sans-serif;font-size:11px;font-weight:500;color:#cbd5e1;}
.fpop-links{display:flex;flex-wrap:wrap;gap:6px;}
.fpop-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:7px 12px;border-radius:8px;text-decoration:none;border:1px solid rgba(255,255,255,.12);color:#94a3b8;transition:all .13s;background:rgba(255,255,255,.04);}
.fpop-link:hover{border-color:rgba(255,255,255,.25);color:#f1f5f9;background:rgba(255,255,255,.08);}
.fpop-link.web{background:var(--gold);color:#000;border-color:var(--gold);font-weight:600;}
.fpop-link.web:hover{background:#e09518;}

/* Legend */
.map-legend{
  position:absolute;bottom:24px;left:14px;z-index:800;
  background:rgba(17,24,39,.92);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px 12px;
  backdrop-filter:blur(8px);
}
.mlt{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--text2);margin-bottom:6px;}
.mlr{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:10px;color:var(--text);}
.mld{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.mlsep{height:1px;background:var(--border);margin:6px 0;}

/* empty */
.empty{display:none;flex-direction:column;align-items:center;justify-content:center;height:160px;color:var(--text2);font-size:12px;gap:6px;}
.empty.on{display:flex;}

@media(max-width:700px){
  :root{--sidebar:100vw;}
  .main{flex-direction:column-reverse;}
  .mapwrap{height:50dvh;flex:none;}
  .panel{height:50dvh;width:100%;border-right:none;}
  .kpis{display:none;}
}
</style>
</head>
<body>
<header>
  <div class="hrow1">
    <div class="logo">Grans Projectes de <em>Barcelona</em></div>

      <span style="color:var(--text2);font-size:13px">🔍</span>

    </div>
    <div class="kpis">

      <div class="kpi"><div class="n" id="ki">—</div><div class="l">Inversió total</div></div>

  <div class="hrow2" id="hrow2">
    <button class="spill on" data-s="all">Tots</button>
    <button class="spill" data-s="En Curso">🔨 En curs</button>

  </div>
</header>

<div class="main">

    <div class="map-legend">

      <div class="mlr"><div class="mld" style="background:var(--c-urb)"></div>Urbanisme</div>
      <div class="mlr"><div class="mld" style="background:var(--c-tra)"></div>Transport</div>
      <div class="mlr"><div class="mld" style="background:var(--c-cul)"></div>Cultura</div>

      <div class="mlsep"></div>
      <div class="mlt">Mida = Inversió</div>
      <div class="mlr" style="gap:8px;color:var(--text2)">

        <div style="width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.25)"></div><span style="font-size:9px">&gt;300M</span>
      </div>
    </div>
  </div>
</div>

<div class="fpop" id="fpop">
  <button class="fpop-close" id="fpop-close">×</button>
  <div class="fpop-cat" id="fpop-cat"></div>
  <div class="fpop-name" id="fpop-name"></div>
  <div class="fpop-sep"></div>
  <div class="fpop-status" id="fpop-status"></div>
  <div class="fpop-desc" id="fpop-desc"></div>
  <div class="fpop-grid">
    <div class="fpop-kv"><div class="k">INVERSIÓ</div><div class="v inv" id="fpop-inv"></div></div>
    <div class="fpop-kv"><div class="k">PROMOTOR</div><div class="v sm" id="fpop-prom"></div></div>
    <div class="fpop-kv"><div class="k">INICI</div><div class="v" id="fpop-ini"></div></div>
    <div class="fpop-kv"><div class="k">FI PREVISTA</div><div class="v" id="fpop-fin"></div></div>
  </div>
  <div class="fpop-links" id="fpop-links"></div>
</div>

function makeMarker(p) {
  const r = mr(p.inv);
  const col = CHEX[p.cat] || '#888';
  const s = stat(p);

  const icon = L.divIcon({
    className: '',
    html: `<div style="
      width:${r*2}px;height:${r*2}px;border-radius:50%;
      background:${col};border:2px solid rgba(255,255,255,0.8);
      box-shadow:0 0 0 3px rgba(0,0,0,0.3),0 3px 12px rgba(0,0,0,0.5);
      cursor:pointer;transition:transform .15s,box-shadow .15s;
      ${s==='En Curso'?`animation:pulse_${p.id} 2.5s ease-in-out infinite;`:''}
    "></div>
    ${s==='En Curso'?`<style>
      @keyframes pulse_${p.id}{
        0%,100%{box-shadow:0 0 0 0 ${col}55,0 3px 12px rgba(0,0,0,0.5);}
        50%{box-shadow:0 0 0 8px ${col}00,0 3px 12px rgba(0,0,0,0.5);}
      }
    </style>`:''}`,
    iconSize: [r*2, r*2],
    iconAnchor: [r, r],
  });

  const m = L.marker([p.lat, p.lng], { icon });

  m.on('mouseover', () => {
    const el = m.getElement();
    if (el) el.querySelector('div').style.transform = 'scale(1.2)';
  });
  m.on('mouseout', () => {
    const el = m.getElement();
    if (el) el.querySelector('div').style.transform = 'scale(1)';
  });
  m.on('click', (e) => { pick(p.id); openPopup(p, e.latlng); L.DomEvent.stopPropagation(e); });

  return m;
}

P.forEach(p => {
  const m = makeMarker(p);
  mEls[p.id] = { marker: m, visible: true };
  m.addTo(map);
});

// ── STATE ─────────────────────────────────────────────────────────────────
let actCats = new Set(CATS);
let actStat = 'all';
let q = '';
let selId = null;

// ── CATEGORY PILLS ─────────────────────────────────────────────────────────
const hrow2 = document.getElementById('hrow2');
const pillEls = {};

function setPillState(b, cat, on) {
  if (on) {
    b.classList.add('on');
    b.classList.remove('off');
    b.style.borderColor = CHEX[cat] + '88';
    b.style.background = CHEX[cat] + '18';
  } else {
    b.classList.remove('on');
    b.classList.add('off');
    b.style.borderColor = '';
    b.style.background = '';
  }
}

CATS.forEach(cat => {
  const b = document.createElement('button');
  b.className = 'cpill on';
  b.dataset.cat = cat;
  b.innerHTML = `<span class="cdot" style="background:${CHEX[cat]}"></span><span style="color:${CHEX[cat]};font-weight:600">${cat}</span>`;
  setPillState(b, cat, true);
  b.addEventListener('click', () => {
    const willBeOn = !b.classList.contains('on');
    actCats[willBeOn ? 'add' : 'delete'](cat);
    setPillState(b, cat, willBeOn);
    render();
  });
  hrow2.appendChild(b);
  pillEls[cat] = b;
});

// "Tots" reset link
const resetBtn = document.createElement('button');
resetBtn.className = 'spill';
resetBtn.style.cssText = 'font-size:10px;padding:4px 10px;margin-left:4px;';
resetBtn.textContent = '↺ Reset';
resetBtn.addEventListener('click', () => {
  CATS.forEach(cat => {
    actCats.add(cat);
    setPillState(pillEls[cat], cat, true);
  });
  document.querySelectorAll('.spill[data-s]').forEach(x => x.classList.remove('on'));
  document.querySelector('.spill[data-s="all"]').classList.add('on');
  actStat = 'all';
  document.getElementById('srch').value = '';
  q = '';
  render();
});
hrow2.appendChild(resetBtn);

// ── STATUS PILLS ──────────────────────────────────────────────────────────
document.querySelectorAll('.spill').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.spill').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    actStat = b.dataset.s;
    render();
  });
});

// ── SEARCH ────────────────────────────────────────────────────────────────
document.getElementById('srch').addEventListener('input', e => {
  q = e.target.value.toLowerCase().trim();
  render();
});

// ── VISIBILITY ────────────────────────────────────────────────────────────
function vis(p) {
  if (!actCats.has(p.cat)) return false;
  if (actStat !== 'all' && stat(p) !== actStat) return false;
  if (q) {
    const haystack = (p.name + ' ' + p.desc + ' ' + p.promotor).toLowerCase();
    if (!haystack.includes(q)) return false;
  }
  return true;
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render() {
  let cnt = 0, inv = 0, act = 0;

  P.forEach(p => {
    const v = vis(p);
    const { marker } = mEls[p.id];
    if (v && !map.hasLayer(marker)) marker.addTo(map);
    else if (!v && map.hasLayer(marker)) map.removeLayer(marker);
    if (v) { cnt++; inv += p.inv; if (stat(p) === 'En Curso') act++; }
  });

  document.getElementById('kn').textContent = cnt;
  document.getElementById('ka').textContent = act;
  document.getElementById('ki').textContent = inv >= 1000 ? (inv/1000).toFixed(1)+'B€' : Math.round(inv)+'M€';

  const cards = document.getElementById('cards');
  cards.innerHTML = '';
  const empty = document.createElement('div');
  empty.className = 'empty';
  empty.innerHTML = '😕 <span>Cap projecte coincideix</span>';
  cards.appendChild(empty);

  const visible = P.filter(vis);
  document.getElementById('phdr').textContent = `${visible.length} projecte${visible.length !== 1 ? 's' : ''} · clica per veure detalls`;

  if (!visible.length) { empty.classList.add('on'); return; }

  const bycat = {};
  CATS.forEach(c => bycat[c] = []);
  visible.forEach(p => { if (bycat[p.cat]) bycat[p.cat].push(p); });

  CATS.forEach(cat => {
    const ps = bycat[cat].sort((a, b) => a.fin - b.fin);
    if (!ps.length) return;

    const sep = document.createElement('div');
    sep.className = 'catsep';
    sep.innerHTML = `<span style="color:${CHEX[cat]}">${CICO[cat]}</span><span style="color:${CHEX[cat]}">${cat}</span><span class="catcnt">${ps.length}</span>`;
    cards.appendChild(sep);

    ps.forEach(p => {
      const s = stat(p), col = CHEX[p.cat];
      const card = document.createElement('div');
      card.className = 'card' + (p.id === selId ? ' active' : '');
      card.dataset.id = p.id;
      card.innerHTML = `
        <div class="ctop">
          <div class="cname">${p.name}</div>
          <div class="cinv">${p.inv >= 1000 ? (p.inv/1000).toFixed(1)+'B' : p.inv.toLocaleString('ca')}M€</div>
        </div>
        <div class="cmeta">
          <span class="cbadge" style="background:${col}20;color:${col}">${CICO[cat]} ${cat}</span>
          <span class="cstatus" style="background:${SCOL[s]};color:${STXT[s]}">${SLAB[s]}</span>
          <span class="cyears">${p.ini}–${p.fin}</span>
        </div>
        <div class="cdesc">${p.desc}</div>`;
      card.addEventListener('click', () => {
        pick(p.id);
        const latlng = L.latLng(p.lat, p.lng);
        map.flyTo(latlng, Math.max(map.getZoom(), 15), { duration: 0.8 });
        setTimeout(() => openPopup(p, latlng), 400);
      });
      cards.appendChild(card);
    });
  });
}

// ── SELECT & PAN ──────────────────────────────────────────────────────────
function pick(id) {
  selId = id;
  document.querySelectorAll('.card').forEach(c => c.classList.toggle('active', parseInt(c.dataset.id) === id));
  const card = document.querySelector(`.card[data-id="${id}"]`);
  if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ── FLOATING POPUP ────────────────────────────────────────────────────────
const fpop = document.getElementById('fpop');
const mapwrapEl = document.querySelector('.mapwrap');

function openPopup(p, latlng) {
  const s = stat(p), col = CHEX[p.cat];

  const catEl = document.getElementById('fpop-cat');
  catEl.textContent = `${CICO[p.cat]} ${p.cat}`;
  catEl.style.cssText = `background:${col}25;color:${col};display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;margin-bottom:10px;text-transform:uppercase;letter-spacing:.07em`;

  document.getElementById('fpop-name').textContent = p.name;

  const stEl = document.getElementById('fpop-status');
  stEl.textContent = SLAB[s];
  stEl.style.cssText = `background:${SCOL[s]};color:${STXT[s]};display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 11px;border-radius:6px;margin-bottom:12px`;

  document.getElementById('fpop-desc').textContent = p.desc;
  document.getElementById('fpop-inv').textContent = (p.inv >= 1000 ? (p.inv/1000).toFixed(1)+'B' : p.inv.toLocaleString('ca')) + 'M€';
  document.getElementById('fpop-ini').textContent = p.ini;
  document.getElementById('fpop-fin').textContent = p.fin;
  document.getElementById('fpop-prom').textContent = p.promotor;
  document.getElementById('fpop-links').innerHTML = `
    ${p.web ? `<a class="fpop-link web" href="${p.web}" target="_blank">🌐 Web oficial</a>` : ''}
    ${p.p1 ? `<a class="fpop-link" href="${p.p1}" target="_blank">🔍 La Vanguardia</a>` : ''}
    ${p.p2 ? `<a class="fpop-link" href="${p.p2}" target="_blank">🔍 El Periódico / Ara</a>` : ''}
  `;

  // Position popup near the clicked point on screen
  const point = map.latLngToContainerPoint(latlng);
  const mRect = mapwrapEl.getBoundingClientRect();
  const pw = 320, ph = 420;
  const margin = 12;

  let left = point.x + 16;
  let top = point.y - ph / 2;

  // Flip left if too close to right edge
  if (left + pw > mRect.width - margin) left = point.x - pw - 16;
  // Clamp vertically
  top = Math.max(margin, Math.min(top, mRect.height - ph - margin));

  fpop.style.left = left + 'px';
  fpop.style.top = top + 'px';
  fpop.classList.add('open');
}

function closePopup() { fpop.classList.remove('open'); }
document.getElementById('fpop-close').onclick = closePopup;
map.on('click', closePopup);

render();

}
loadScript('https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js', function() {
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initMap);
  } else {
    initMap();
  }
});
</script>
